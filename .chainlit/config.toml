[project]
# Disable Chainlit's own telemetry — this toolkit is privacy-first
enable_telemetry = false

[UI]
name = "Portable Agentic Toolkit"
description = "Local AI agent workspace — zero cloud"
show_readme_as_default = true
collapse_content = false
default_theme = "dark"

[features]
prompt_playground = false
multi_modal = false
speech_to_text = { enabled = false }

[server]
# Chainlit saves uploaded files here; keep inside project dir
files_base_path = ".files"
