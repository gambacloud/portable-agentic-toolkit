<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage MCP Servers</title>
<style>
  :root {
    --bg-color: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.7);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --danger: #ef4444;
    --success: #10b981;
  }
  body {
    background: var(--bg-color);
    background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                      radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
    color: var(--text-main);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 2rem;
    min-height: 100vh;
    box-sizing: border-box;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
  }
  h1 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p.subtitle {
    color: var(--text-muted);
    margin-bottom: 2rem;
    font-size: 1.1rem;
  }
  .glass-card {
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .glass-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }
  .mcp-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .mcp-title {
    font-size: 1.25rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .mcp-title span {
    font-size: 1.5rem;
  }
  .mcp-details {
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .mcp-details code {
    background: rgba(0,0,0,0.3);
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    font-family: monospace;
  }
  
  /* Toggle Switch */
  .switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
  }
  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(255, 255, 255, 0.1);
    transition: .4s;
    border-radius: 34px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 4px;
    bottom: 3px;
    background-color: var(--text-muted);
    transition: .4s;
    border-radius: 50%;
  }
  input:checked + .slider {
    background-color: var(--success);
    border-color: var(--success);
  }
  input:checked + .slider:before {
    transform: translateX(20px);
    background-color: white;
  }
  
  /* Install Form */
  .install-section {
    margin-top: 3rem;
  }
  .install-form {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
  }
  input[type="text"] {
    flex-grow: 1;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  button:hover {
    background: var(--accent-hover);
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #loading {
    display: none;
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
  }
  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 1s ease-in-out infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>MCP Tool Management</h1>
  <p class="subtitle">Enable, disable, or install Model Context Protocol (MCP) servers.</p>

  <div id="loading"><div class="spinner"></div> Loading servers...</div>
  <div id="mcp-list"></div>

  <div class="install-section glass-card">
    <div class="mcp-title"><span>📥</span> Install New Server</div>
    <p class="mcp-details" style="margin-top: 0.5rem;">Enter the name of a server from the catalog (e.g. <code>server-filesystem</code>, <code>server-brave-search</code>).</p>
    <form class="install-form" id="install-form">
      <input type="text" id="install-name" placeholder="Server name..." required>
      <button type="submit" id="install-btn">Install</button>
    </form>
    <div id="install-message" style="margin-top: 1rem; font-size: 0.9rem;"></div>
  </div>
</div>

<script>
  async function fetchMCPs() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('mcp-list').innerHTML = '';
    try {
      const res = await fetch('/mcps');
      const mcps = await res.json();
      document.getElementById('loading').style.display = 'none';
      
      if (mcps.length === 0) {
        document.getElementById('mcp-list').innerHTML = '<div class="glass-card"><p class="mcp-details">No MCP servers installed yet.</p></div>';
        return;
      }
      
      mcps.forEach(mcp => {
        const command = mcp.config.command + ' ' + (mcp.config.args ? mcp.config.args.join(' ') : '');
        const requiresConfirm = mcp.config.requires_confirmation ? 'Yes' : 'No';
        
        const card = document.createElement('div');
        card.className = 'glass-card';
        card.innerHTML = `
          <div class="mcp-header">
            <div class="mcp-title"><span>🔌</span> ${mcp.name}</div>
            <label class="switch">
              <input type="checkbox" ${mcp.enabled ? 'checked' : ''} onchange="toggleMCP('${mcp.name}', this.checked)">
              <span class="slider"></span>
            </label>
          </div>
          <div class="mcp-details">
            <p><strong>Command:</strong> <code>${command}</code></p>
            <p><strong>Requires Confirmation:</strong> ${requiresConfirm}</p>
          </div>
        `;
        document.getElementById('mcp-list').appendChild(card);
      });
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('mcp-list').innerHTML = '<p style="color:var(--danger)">Error loading MCPs.</p>';
    }
  }

  async function toggleMCP(name, enabled) {
    try {
      await fetch('/mcps/' + name, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled })
      });
    } catch (err) {
      alert('Failed to update status');
      fetchMCPs(); // revert
    }
  }

  document.getElementById('install-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('install-btn');
    const input = document.getElementById('install-name');
    const msg = document.getElementById('install-message');
    const name = input.value.trim();
    
    if (!name) return;
    
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Installing...';
    msg.innerHTML = '';
    
    try {
      const res = await fetch('/mcps', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const data = await res.json();
      
      if (res.ok && !data.result.includes('Unknown server')) {
        msg.style.color = 'var(--success)';
        msg.innerText = data.result;
        input.value = '';
        fetchMCPs();
      } else {
        msg.style.color = 'var(--danger)';
        msg.innerText = data.result || 'Failed to install.';
      }
    } catch (err) {
      msg.style.color = 'var(--danger)';
      msg.innerText = 'Network error during installation.';
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Install';
    }
  });

  fetchMCPs();
</script>
</body>
</html>
